name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages-main-root
  cancel-in-progress: true

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node scripts/sync-gh-pages-root.mjs

      - name: Commit production build to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets boxes gallery logo.png .nojekyll 404.html favicon.svg
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: update GitHub Pages build [skip ci]"
          git push
